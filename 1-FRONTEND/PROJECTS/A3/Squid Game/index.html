<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squid Game</title>

  <!-- Favicon -->
  <link rel="shortcut icon" href="./image/guard.png" type="image/x-icon">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Remix CDN -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

  <header>
    <img width="80" src="./image/logo.png" alt="logo" class="logo">
    <nav>
      <p>About</p>
      <p id="active">Watch Now</p>
      <p>Actors</p>
      <p>Contact</p>
    </nav>
    <i class="ri-menu-3-line"></i>
  </header>

  <main>
    <section class="series">
      <div class="content">
        <img width="280px" src="./image/logo.png" alt="Thumbnail">
        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang <br>
          Season 1: 9 Episodes
        </p>
        <div class="controls">
          <button><i class="ri-play-fill"></i> Play Now</button>
          <button><i class="ri-play-line"></i> Watch Trailer</button>
        </div>
      </div>

      <div class="image-thumbnail">
        <p>Scroll</p>
        <img src="./image/guard.png" alt="Thumbnail">
        <div class="links">
          <a target="_blank" href="https://twitter.com"><i class="ri-twitter-line"></i></a>
          <a target="_blank" href="https://instagram.com"><i class="ri-instagram-line"></i></a>
          <a target="_blank" href="https://facebook.com"><i class="ri-facebook-line"></i></a>
        </div>
      </div>
    </section>

    <section class="others">
      <div class="cont">
        <div class="tile">
          <img src="./image/tile_1.jpg" alt="Image">
          <i class="ri-play-fill"></i>
        </div>
        <div class="tile">
          <img src="./image/tile_2.webp" alt="Image">
          <i class="ri-play-fill"></i>
        </div>
        <div class="tile">
          <img src="./image/tile_3.jpg" alt="Image">
          <i class="ri-play-fill"></i>
        </div>
      </div>
    </section>

  </main>

</body>

</html>
