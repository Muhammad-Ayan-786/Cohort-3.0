<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

  <main>
    <section class="nav">
      <div class="links">
        <p>Podcast</p>
        <p>Portfolio</p>
        <p>Research</p>
        <p>Clients</p>
      </div>
    </section>

    <section class="img">
      <p class="top-para">About Me</p>
      <img class="person" src="./img/person.jpg" alt="Mee">
      <img class="small-img" src="./img/image-bottom.png" alt="Image">
      <div class="info">
        <h1>Im,<br>Jon<br>Daniel</h1>
        <p>Inquiry@jondaniel.design <i class="ri-mail-open-line"></i></p>
      </div>
    </section>

    <section class="heading">
      <h1>Portfolio</h1>
      <div class="corner1"></div>
      <div class="corner2"></div>
    </section>

    <secion class="video">
      <img src="./img/flymingo.jpg" alt="video">
      <div class="play-cont">
        <i class="ri-play-fill"></i>
      </div>
      <i class="ri-arrow-right-s-line top-arrow"></i>
    </secion>

    <section class="projects-counts">
      <div class="top-cont">
        <i class="ri-arrow-right-s-line top-arrow"></i>
        <div class="count">
          <h2>251</h2>
          <p>Projects</p>
        </div>
      </div>
      <div class="bottom-cont">
        <i class="ri-arrow-right-s-line top-arrow"></i>
        <div class="count">
          <h2>156</h2>
          <p>Awards</p>
        </div>
      </div>
    </section>

    <section class="client">
      <div class="apple-img">
        <img src="./img/apple.png" alt="Apple">
        <p>Clients</p>
      </div>
      <i class="ri-arrow-right-s-line top-arrow"></i>
    </section>

    <section class="global-awards">
      <div class="ball-img">
        <img src="./img/ball.png" alt="Image">
      </div>
      <div class="right">
        <div class="content">
          <h2>172</h2>
          <p class="para1">Global Design</p>
          <p class="para2">Awards</p>
        </div>
      </div>
      <i class="ri-arrow-right-s-line top-arrow"></i>
    </section>
  </main>

</body>

</html>
